<div class="app-container">
  <header class="app-header">
    <h1>{{ title }}</h1>
    <p>Desafíos reales de emprendimientos + Soluciones prácticas</p>
  </header>

  <main class="main-content">
    <div class="controls">
      <button (click)="actualizarConsignas()" class="btn-refresh">
        🔄 Nueva selección de 10 consignas
      </button>
      <div class="stats">
        <span>Total disponibles: {{ cantidadTotal }}</span>
        <span>Mostrando: {{ consignas.length }}</span>
      </div>
    </div>

    <div class="consignas-grid">
      <app-card-consigna *ngFor="let consigna of consignas" 
        [consigna]="consigna"
        (toggleRespuesta)="toggleRespuesta($event)">
      </app-card-consigna>
    </div>
  </main>
</div>

<router-outlet />

<h1 class="bg-emerald-500">¡A comenzar el proyecto!</h1>
<main class="w-full flex justify-center">
    <app-menu></app-menu>
</main>
