<div class="justify-center border border-gray-600 rounded-2xl flex flex-wrap w-full bg-gray-500 m-2 p-2 gap-2">

    <div class="w-full text-center m-2">
        <app-card-consigna 
        [consigna]="consignas[posicion]"
        (toggleRespuesta)="toggleRespuesta($event)">
      </app-card-consigna>
        <!-- Seccion para mostrar componente de cards -->
    </div>
    <div class="w-full justify-center text-center flex flex-wrap m-2 ">
        @for(option of opciones;track $index){
            <div (click)="cambiarContenido()" class="hover:bg-sky-400 bg-indigo-400 rounded border transition w-1/2 p-2 gap-2">
                <h1>{{option}}</h1>
            </div>
        }
    </div>
</div>
